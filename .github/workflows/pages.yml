name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_VERSION: "0.21.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache Trunk binary
        id: cache-trunk
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/trunk
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: trunk-${{ runner.os }}-${{ env.TRUNK_VERSION }}

      - name: Install Trunk
        if: steps.cache-trunk.outputs.cache-hit != 'true'
        run: cargo install trunk --version "${TRUNK_VERSION}" --locked

      - name: Check Trunk
        run: trunk --version

      - name: Check workspace
        run: cargo check --workspace

      - name: Set public base path
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY#*/}" == *.github.io ]]; then
            echo "PUBLIC_BASE=" >> "${GITHUB_ENV}"
          else
            echo "PUBLIC_BASE=/${GITHUB_REPOSITORY#*/}" >> "${GITHUB_ENV}"
          fi

      - name: Prepare dashboard
        run: mkdir -p public

      - name: Copy dashboard
        run: cp site/index.html public/index.html

      - name: Build WFC visualizer
        working-directory: wfc-road-visualizer
        run: trunk build --release --public-url "${PUBLIC_BASE}/wfc-road-visualizer/" --dist ../public/wfc-road-visualizer

      - name: Build search index visualizer
        working-directory: search-index-visualizer
        run: trunk build --release --public-url "${PUBLIC_BASE}/search-index-visualizer/" --dist ../public/search-index-visualizer

      - name: Build Raft consensus visualizer
        working-directory: raft-consensus-viz
        run: trunk build --release --public-url "${PUBLIC_BASE}/raft-consensus-viz/" --dist ../public/raft-consensus-viz

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
