name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_PAGES_TOKEN: ${{ secrets.PAGES_TOKEN != '' }}
      TRUNK_VERSION: "0.21.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages with enablement
        if: github.event_name != 'pull_request' && env.HAS_PAGES_TOKEN == 'true'
        id: pages_enablement
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_TOKEN }}

      - name: Configure Pages
        if: github.event_name != 'pull_request' && env.HAS_PAGES_TOKEN != 'true'
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache Trunk binary
        id: cache-trunk
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/trunk
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: trunk-${{ runner.os }}-${{ env.TRUNK_VERSION }}

      - name: Install Trunk
        if: steps.cache-trunk.outputs.cache-hit != 'true'
        run: cargo install trunk --version "${TRUNK_VERSION}" --locked

      - name: Check Trunk
        run: trunk --version

      - name: Check workspace
        run: cargo check --workspace

      - name: Prepare dashboard
        run: mkdir -p public

      - name: Copy dashboard
        run: cp site/index.html public/index.html

      - name: Build WFC visualizer
        working-directory: wfc-road-visualizer
        run: trunk build --release --public-url "${PUBLIC_BASE}/wfc-road-visualizer/" --dist ../public/wfc-road-visualizer
        env:
          PUBLIC_BASE: ${{ github.event_name == 'pull_request' && '/showcase' || steps.pages_enablement.outputs.base_path || steps.pages.outputs.base_path }}

      - name: Build search index visualizer
        working-directory: search-index-visualizer
        run: trunk build --release --public-url "${PUBLIC_BASE}/search-index-visualizer/" --dist ../public/search-index-visualizer
        env:
          PUBLIC_BASE: ${{ github.event_name == 'pull_request' && '/showcase' || steps.pages_enablement.outputs.base_path || steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
